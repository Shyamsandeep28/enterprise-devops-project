apiVersion: apps/v1
kind: Deployment

metadata:
  name: login-deployment

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: login-app

  template:
    metadata:
      labels:
        app: login-app

    spec:
      containers:
      - name: login-container
        image: sandeep289/loginservice:v1

        ports:
        - containerPort: 8081
